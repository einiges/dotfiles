bind = SUPER, dead_circumflex, focusworkspaceoncurrentmonitor, previous

bind = SUPER, KP_1, focusworkspaceoncurrentmonitor, name:web
bind = SUPER, KP_2, focusworkspaceoncurrentmonitor, name:term
bind = SUPER, KP_3, focusworkspaceoncurrentmonitor, name:code
bind = SUPER, KP_4, focusworkspaceoncurrentmonitor, name:data
bind = SUPER, KP_5, focusworkspaceoncurrentmonitor, 5
