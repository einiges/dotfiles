# F13: XF86Tools
# F14: XF86Launch5
# F15: XF86Launch6
# F16: XF86Launch7
# F17: XF86Launch8
# F18: XF86Launch9
# F19: NoSymbol
# F20: XF86AudioMicMute
# F21: XF86TouchPadToggle
# F22: XF86TouchPadOn
# F23: XF86TouchPadOff
# F24: NoSymbol

$terminal = kitty --single-instance

binds = super_l, n&r, exec, $terminal

# hyprland

bind = SUPER, F1, exec, $hypr/bin/gamemode
bind = SUPER, F5, exec, hyprctl reload



#   QUICK LAUNCH

bind = SUPER, Return, exec, $terminal
bind = SUPER, e, exec, thunar
bind = SUPER, a, exec, browser
bind = SUPER, v, exec, pavucontrol



#   LAUNCHERS

bindr = SUPER, SUPER_L , exec, pkill rofi || rofi -show-icons -show drun -drun-exclude-categories 'UserSession,SystemPower'

bindr = SUPER SHIFT, Shift_L, submap, menuexec
submap = menuexec, reset
	# man (1,5)
	bindr = , m, exec, man --apropos --sections='1,5' . | cut --delimiter=' ' --fields=1 | rofi -dmenu | xargs --no-run-if-empty $terminal man
	bindr = , n, exec, man --apropos                  . | cut --delimiter=' ' --fields=1 | rofi -dmenu | xargs --no-run-if-empty $terminal man

	# passmenu
	bindr = , p, exec, passmenu-rofi
	
	bind = , catchall, submap, reset
submap = reset



#   SCREENSHOT

bind = SUPER, p,     submap, screenshot

submap = screenshot, reset
	$scrn    = grim -g -
	$scrncpy = grim -g - - | wl-copy

	# active window
	$active_window_geometry_cmd = hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"'
	bind =      , w, exec, $active_window_geometry_cmd | $scrn
	bind = SHIFT, W, exec, $active_window_geometry_cmd | $scrncpy

	# active workspace
	#     like monitor, excluding reserved area
	$active_workspace_geomentry_cmd = hyprctl monitors -j | jq -r --arg monitor "$(hyprctl activeworkspace -j | jq -r '.monitor')" 'map(select(.name == $monitor) | "\(.x + .reserved[0]),\(.y + .reserved[1]) \(.width - .reserved[0] - .reserved[2])x\(.height - .reserved[1] - .reserved[3])") | first'
	bind =       , s, exec, $active_workspace_geomentry_cmd | $scrn
	bind = SHIFT , S, exec, $active_workspace_geomentry_cmd | $scrncpy

	# active monitor
	$active_monitor_geomentry_cmd = hyprctl monitors -j | jq -r --arg monitor "$(hyprctl activeworkspace -j | jq -r '.monitor')" 'map(select(.name == $monitor) | "\(.x),\(.y) \(.width)x\(.height)") | first'
	bind =      , m, exec, $active_monitor_geomentry_cmd | $scrn
	bind = SHIFT, M, exec, $active_monitor_geomentry_cmd | $scrncpy

	# area: free selection
	$area_selection_geomentry_cmd = slurp -d
	bind =      , a, exec, $area_selection_geomentry_cmd | $scrn
	bind = SHIFT, A, exec, $area_selection_geomentry_cmd | $scrncpy

	# everything
	bind =      , e, exec, grim
	bind = SHIFT, E, exec, grim | wl-copy

	bindr = , catchall, submap, reset
submap = reset

bind =      , Print, exec, $active_window_geometry_cmd | $scrn


#   WINDOW OPERATIONS

bind = SUPER      , x, closewindow, activewindow
bind = SUPER SHIFT, X, killwindow,  activewindow

bind = SUPER,       f, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER CTRL,  f, togglefloating, active
bind = SUPER CTRL,  f, centerwindow

bind = SUPER, s, pin, active

# focus window
bind = SUPER, n, movefocus, l
bind = SUPER, r, movefocus, d
bind = SUPER, t, movefocus, u
bind = SUPER, d, movefocus, r

bind = SUPER, space, focusurgentorlast
bind = SUPER, tab, cyclenext, prev hist
bind = SUPER, tab, bringactivetotop
bind = SUPER SHIFT, tab, cyclenext, next hist
bind = SUPER SHIFT, tab, bringactivetotop

# position tiled windows
bind = SUPER SHIFT, n, swapwindow, l
bind = SUPER SHIFT, r, swapwindow, d
bind = SUPER SHIFT, t, swapwindow, u
bind = SUPER SHIFT, d, swapwindow, r

# position floating windows
binde = SUPER SHIFT, n, movewindowpixel, -250    0,activewindow
binde = SUPER SHIFT, r, movewindowpixel, 0     100,activewindow
binde = SUPER SHIFT, t, movewindowpixel, 0    -100,activewindow
binde = SUPER SHIFT, d, movewindowpixel,  250    0,activewindow

bind = SUPER SHIFT, space, centerwindow

# resize window
binde = SUPER CTRL, n, resizeactive,  -20%   0%
binde = SUPER CTRL, r, resizeactive,    0%  20%
binde = SUPER CTRL, t, resizeactive,    0% -20%
binde = SUPER CTRL, d, resizeactive,   20%   0%

# layout
bind = SUPER MOD5, n, layoutmsg, preselect l
bind = SUPER MOD5, r, layoutmsg, preselect d
bind = SUPER MOD5, t, layoutmsg, preselect u
bind = SUPER MOD5, d, layoutmsg, preselect r
bind = SUPER MOD5, space, layoutmsg, togglesplit
bind = SUPER MOD5, f, layoutmsg, movetoroot

# focus workspace
bind = SUPER, minus, togglespecialworkspace
bind = SUPER, 1, focusworkspaceoncurrentmonitor, 1
